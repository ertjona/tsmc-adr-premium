name: Update TSMC ADR Premium Data

on:
  schedule:
    - cron: '30 22 * * 1-5'  # 平日 22:30 UTC（NYSE 收盤後約 1.5 小時）
  workflow_dispatch:           # 允許手動觸發

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          MPLBACKEND: Agg  # headless backend，CI 環境不需要顯示器
        run: python tsmc_adr_premium.py 5y

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tsmc_adr_premium.csv tsmc_adr_premium.png
          git diff --staged --quiet || git commit -m "data: update ADR premium $(date -u +%Y-%m-%d)"
          git push
